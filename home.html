<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØVA - Home</title>
    <style>
        /* 背景アニメーションとグラデーション */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, #2e004f 0%, #0f0518 100%);
            color: #ffffff;
        }

        /* 背景に配置するマテリアルな物体（浮かぶシェイプ） */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        .blob:nth-child(1) { width: 400px; height: 400px; background: #8a2be2; top: -100px; left: -100px; }
        .blob:nth-child(2) { width: 300px; height: 300px; background: #4b0082; bottom: -50px; right: -50px; }
        .blob:nth-child(3) { width: 250px; height: 250px; background: #9370db; top: 20%; right: 10%; animation-delay: 2s; }

        /* コンテナ */
        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            color: #e0d8ff;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .search-box {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.2);
        }

        .shortcuts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .shortcut-item {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: #dcdcdc;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shortcut-item:hover {
            transform: translateY(-5px);
            background: rgba(138, 43, 226, 0.3);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 背景の浮遊するマテリアル物体 -->
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>

    <div class="container">
        <h1>NØVA</h1>
        <input type="text" class="search-box" placeholder="検索またはURLを入力...">

        <div class="shortcuts">
            <a href="https://www.google.com" class="shortcut-item">Google</a>
            <a href="https://www.bing.com" class="shortcut-item">Bing</a>
            <a href="https://www.youtube.com" class="shortcut-item">YouTube</a>
            <a href="https://www.wikipedia.org" class="shortcut-item">Wiki</a>
            <a href="https://github.com" class="shortcut-item">GitHub</a>
        </div>
    </div>

    <script>
        const searchInput = document.querySelector('.search-box');
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query.startsWith('http://') || query.startsWith('https://')) {
                    window.location.href = query;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
