<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØVA - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #7289da;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background: #202124;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            outline: none;
            box-sizing: border-box;
        }

        .shortcuts {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .shortcut-item {
            width: 70px;
            height: 70px;
            background: #202124;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .shortcut-item:hover {
            transform: scale(1.1);
            background: #2f3136;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NØVA</h1>
        <input type="text" class="search-box" placeholder="検索またはURLを入力...">

        <div class="shortcuts">
            <a href="https://www.google.com" class="shortcut-item">Google</a>
            <a href="https://www.bing.com" class="shortcut-item">Bing</a>
            <a href="https://www.youtube.com" class="shortcut-item">YouTube</a>
            <a href="https://www.wikipedia.org" class="shortcut-item">Wiki</a>
            <a href="https://github.com" class="shortcut-item">GitHub</a>
        </div>
    </div>

    <script>
        const searchInput = document.querySelector('.search-box');
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (query.startsWith('http://') || query.startsWith('https://')) {
                    window.location.href = query;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
